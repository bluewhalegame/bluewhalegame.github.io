<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lan Wer Er Network</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="google-site-verification" content="vVweMsOyiZ7n4GF_F9EYeSVSOU0LU5y_XLQx1EmrIOg" />
</head>
<body>

  <!-- Header / Nav -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">Blue Whale Network</span>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-inner">
      <h1>Fun Games for Everyone</h1>
      <p>We craft relaxing and engaging mobile games loved by players around the world.</p>
    </div>
  </section>

  <!-- Products Section -->
  <section class="products-section">
    <div class="section-inner">
      <h2 class="section-title">Our Games</h2>
      <div class="products-grid">

        <!-- Product Card: Magic Tile Water -->
        <div class="product-card">
          <div class="product-icon-wrap">
            <img
              src="images/AppIcon.png"
              alt="Magic Tile Water Icon"
              class="product-icon"
              onerror="this.style.background='#1a6fa8';this.src='';this.alt='MTW'"
            />
          </div>
          <div class="product-info">
            <h3 class="product-name">GoGo Arrow - Blue Move</h3>
            <p class="product-desc">
              Waiting publish...
            </p>
            <div class="product-screenshots">
              <img src="images/products/magic_tile_water_ss1.png" alt="Screenshot 1" class="screenshot" onerror="this.style.display='none'" />
              <img src="images/products/magic_tile_water_ss2.png" alt="Screenshot 2" class="screenshot" onerror="this.style.display='none'" />
              <img src="images/products/magic_tile_water_ss3.png" alt="Screenshot 3" class="screenshot" onerror="this.style.display='none'" />
            </div>
            <div class="product-actions">
              <a href="https://play.google.com" class="btn-store btn-google" target="_blank" rel="noopener">
                <img src="images/google_play_badge.svg" alt="Get it on Google Play" class="store-badge" />
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; 2026 Lan Wer Er Network. All rights reserved.</p>
      <nav class="footer-nav">
        <a href="privacy.html">Privacy Policy</a>
      </nav>
    </div>
  </footer>

</body>
</html>
